# render.yaml — Render.com deployment config
# This file tells Render how to deploy your server
# Place this in the root of your project

services:
  - type: web
    name: galaxy-cinemas-agent
    runtime: node
    buildCommand: npm install && npx playwright install chromium --with-deps
    startCommand: npm start
    envVars:
      - key: PORT
        value: 3000
      - key: NODE_ENV
        value: production
    plan: free
